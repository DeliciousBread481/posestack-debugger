name: Build PoseStack Debugger

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build loader jars
        run: ./gradlew buildAll

      - name: Upload Fabric artifact
        uses: actions/upload-artifact@v4
        with:
          name: posestack-debugger-fabric
          path: fabric/build/libs/*-fabric-*.jar
          if-no-files-found: error

      - name: Upload NeoForge artifact
        uses: actions/upload-artifact@v4
        with:
          name: posestack-debugger-neoforge
          path: neoforge/build/libs/*-neoforge-*.jar
          if-no-files-found: error